<!DOCTYPE html>
<html lang="en">
<head>

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;

    fbq('init', '1252040857081560');

        <img height="1" width="1" style="display:none"

    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: #fff; margin: 0; }
        .loader { width: 48px; height: 48px; border: 5px solid #eee; border-bottom-color: #3395ff; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } } 
        .status { margin-top: 20px; font-weight: 600; color: #444; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="s">Connecting to Bank...</div>

    <script>
        const msgs = ["Verifying UTR...", "Securing Connection...", "Finalizing Booking...", "Redirecting..."];
        let i = 0;
        const itv = setInterval(() => {
            if(i < msgs.length) {
                document.getElementById('s').innerText = msgs[i++];
            } else { 
                clearInterval(itv); 
                window.location.href = 'success.html'; 
            }
        }, 1200);
    </script>
</body>
