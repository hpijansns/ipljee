<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            padding: 0;
            color: #333; 
        }

        /* Top Red Banner */
        .top-banner {
            background: linear-gradient(135deg, #d31027 0%, #ea384d 100%);
            color: #fff;
            text-align: center;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Main Container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* White Professional Card */
        .success-card { 
            background: #fff; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            padding: 40px 30px; 
            max-width: 400px; 
            width: 100%; 
            text-align: center; 
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Green Checkmark Animation */
        .check-icon { 
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: #e8f5e9; 
            color: #28a745; 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            font-size: 45px; 
            margin-bottom: 20px; 
            font-weight: bold;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.2);
        }

        /* Text Typography */
        h1.title { 
            font-size: 26px; 
            font-weight: 800; 
            margin: 0 0 10px; 
            color: #1a1a1a; 
            letter-spacing: -0.5px;
        }

        p.subtitle { 
            font-size: 17px; 
            font-weight: 600; 
            margin: 0 0 15px; 
            color: #333; 
        }

        p.desc { 
            font-size: 15px; 
            color: #666; 
            line-height: 1.6; 
            margin-bottom: 25px; 
        }

        /* Warning Alert Box */
        .alert-box { 
            background: #fff8e1; 
            border-left: 4px solid #ffc107; 
            padding: 15px; 
            text-align: left; 
            font-size: 14px; 
            color: #444; 
            border-radius: 6px; 
            line-height: 1.5; 
            margin-bottom: 30px; 
        }

        .alert-box strong { 
            color: #222; 
            display: block; 
            margin-bottom: 5px; 
            font-size: 14px;
        }

        /* Home Button */
        .home-btn { 
            display: block; 
            background: #2c2c2c; 
            color: white; 
            text-decoration: none; 
            padding: 16px 20px; 
            border-radius: 8px; 
            font-weight: 700; 
            letter-spacing: 1px; 
            transition: 0.3s; 
            width: 100%; 
            box-sizing: border-box;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        .home-btn:hover { 
            background: #111; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        /* Smooth load animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="top-banner">
        Booking Confirmed
    </div>

    <div class="container">
        <div class="success-card">
            <div class="check-icon">✓</div>
            
            <h1 class="title">PAYMENT VERIFIED!</h1>
            <p class="subtitle">Your Match Ticket is Confirmed.</p>
            <p class="desc">An E-Ticket will be sent to your registered Email and Postal Address shortly.</p>

            <div class="alert-box">
                <strong>⚠️ Stadium Entry Requirement:</strong>
                A valid Government-issued Photo ID (e.g., Aadhar/PAN) must be presented at the gates. Please bring it with you.
            </div>

            <button class="home-btn" onclick="location.href='index.html'">HOME</button>
        </div>
    </div>

</body>
</html>
